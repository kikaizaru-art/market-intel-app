name: Collect Real Data

on:
  # 毎日 JST 7:00 (UTC 22:00) に自動収集
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      deploy:
        description: "収集後に GitHub Pages へデプロイする"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pytrends
      - run: npm ci

      - name: Run collectors
        env:
          DOMAIN: memento-mori
        run: npm run collect

      - name: Upload collected data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: collected-memento-mori-${{ github.run_number }}
          path: |
            public/data/collected.json
            data/
          retention-days: 30

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add -f public/data/collected.json
          git add data/history/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data(memento-mori): collect $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: collect
    # スケジュール実行時は常にデプロイ、手動時はオプション
    if: ${{ github.event_name == 'schedule' || inputs.deploy }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - run: git pull origin ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
